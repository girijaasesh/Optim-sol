version: '3.9'

# ──────────────────────────────────────────────────────────────────────
# AgilePro Institute — Production Compose (Hostinger VPS)
# Includes: PostgreSQL + Spring Boot API + Angular/Nginx frontend + Caddy HTTPS
# ──────────────────────────────────────────────────────────────────────

services:

  # ── Database ───────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: agilepro-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       agilepro_db
      POSTGRES_USER:     agilepro
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - backend-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agilepro -d agilepro_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    # NOT exposed to host — only accessible within backend-net

  # ── Spring Boot API ────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agilepro-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL:       jdbc:postgresql://postgres:5432/agilepro_db
      SPRING_DATASOURCE_USERNAME:  agilepro
      SPRING_DATASOURCE_PASSWORD:  ${POSTGRES_PASSWORD}
      JWT_SECRET:                  ${JWT_SECRET}
      GOOGLE_CLIENT_ID:            ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET:        ${GOOGLE_CLIENT_SECRET}
      STRIPE_SECRET_KEY:           ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET:       ${STRIPE_WEBHOOK_SECRET}
      MAIL_HOST:                   ${MAIL_HOST}
      MAIL_PORT:                   ${MAIL_PORT:-587}
      MAIL_USERNAME:               ${MAIL_USERNAME}
      MAIL_PASSWORD:               ${MAIL_PASSWORD}
      APP_FRONTEND_URL:            ${FRONTEND_URL}
      SPRING_PROFILES_ACTIVE:      prod
    networks:
      - backend-net
      - proxy-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      start-period: 120s
      retries: 3

  # ── Angular Frontend ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - API_URL=/api
    container_name: agilepro-frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    networks:
      - proxy-net

  # ── Caddy reverse proxy (auto HTTPS) ──────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: agilepro-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - proxy-net
    depends_on:
      - frontend
      - api

networks:
  backend-net:
    driver: bridge
    internal: true      # postgres never reachable from outside
  proxy-net:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  caddy-data:
    driver: local
  caddy-config:
    driver: local
